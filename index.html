<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ankit Jha</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* COLOR SYSTEM */
:root {
    --text-primary: #1b4332;
    --text-secondary: #344e41;
    --accent: #2d6a4f;
}

.dark {
    --text-primary: #fef9c3;
    --text-secondary: #e2e8f0;
    --accent: #86efac;
}

/* BASE */
body {
    font-family: Inter, sans-serif;
    background: #f7f7f5;
    background-image: url("https://www.transparenttextures.com/patterns/noise.png");
    color: var(--text-primary);
    line-height: 1.6;
    transition: 0.3s;
}

.dark {
    background: #1e293b;
    background-image: url("https://www.transparenttextures.com/patterns/dark-mosaic.png");
}

/* NAV */
header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
}
.dark header {
    background: rgba(30,41,59,0.85);
}

.nav-link {
    position: relative;
    font-size: 18px;
    color: var(--text-primary);
    padding-bottom: 4px;
}

.nav-link::after {
    content:'';
    position:absolute;
    bottom:0;
    left:0;
    width:0;
    height:2px;
    background:var(--accent);
    transition:0.3s;
}

.nav-link.active::after {
    width:100%;
}

/* SECTIONS */
.section {
    padding: 100px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}
.dark .section {
    border-color: rgba(255,255,255,0.08);
}

.section-title {
    font-size: 30px;
    font-weight: 600;
}

p {
    color: var(--text-secondary);
}

/* CARDS */
.card {
    padding: 24px;
    border-radius: 14px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    border: 1px solid #e5e7eb;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.dark .card {
    background: rgba(51,65,85,0.7);
    border-color: #475569;
}

/* TIMELINE STYLE */
.timeline-card {
    border-left: 4px solid var(--accent);
    padding-left: 18px;
}

/* ICON */
.card i {
    width: 28px;
    height: 28px;
    color: var(--accent);
}

/* HERO */
.hero-text {
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

/* FADE */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s ease;
}
.fade.show {
    opacity: 1;
    transform: none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="fixed w-full border-b flex justify-center items-center h-20 z-50">

<div class="absolute left-6 text-2xl">🌤️</div>

<nav class="space-x-10">
<a href="#about" class="nav-link">About</a>
<a href="#work" class="nav-link">Work</a>
<a href="#education" class="nav-link">Education</a>
<a href="#publications" class="nav-link">Publications</a>
<a href="#contact" class="nav-link">Contact</a>
<a href="your_cv.pdf" target="_blank" class="px-4 py-2 border rounded-full">CV</a>
</nav>

<div class="absolute right-6">
<button onclick="toggleTheme()">
<i id="themeIcon" data-lucide="sun"></i>
</button>
</div>

</header>

<!-- HERO -->
<section class="h-screen flex items-center justify-center text-center text-white relative">

<img src="https://images.pexels.com/photos/19236329/pexels-photo-19236329.jpeg?auto=compress&w=1600"
class="absolute w-full h-full object-cover">

<div class="absolute inset-0 bg-black/60"></div>

<div class="relative hero-text px-6">
<h1 class="text-6xl mb-4 font-semibold">Ankit Jha</h1>

<p class="text-green-300 text-xl mb-4">
Climate Action • Communities • Governance
</p>

<p class="italic text-gray-200 max-w-xl mx-auto">
Working at the intersection of people, policy, and planet.
</p>

<!-- UPDATED ICONS -->
<div class="flex justify-center space-x-6 mt-6">

<a href="mailto:your@email.com"><i data-lucide="mail"></i></a>

<a href="https://linkedin.com/in/yourprofile" target="_blank">
<i data-lucide="linkedin"></i>
</a>

<a href="https://researchgate.net/profile/yourprofile" target="_blank">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/researchgate.svg" class="w-5 h-5">
</a>

</div>

</div>
</section>

<!-- EDUCATION (FIXED) -->
<section id="education" class="section">
<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-12 px-6">

<div class="section-title">Education</div>

<div class="md:col-span-2 space-y-6">

<div class="card timeline-card fade">
<h3 class="font-semibold text-lg">Degree Name</h3>
<p class="text-sm">Institution · Year</p>
</div>

<div class="card timeline-card fade">
<h3 class="font-semibold text-lg">Previous Degree</h3>
<p class="text-sm">Institution · Year</p>
</div>

</div>

</div>
</section>

<script>

/* THEME */
function toggleTheme() {
document.body.classList.toggle('dark');
const icon = document.getElementById("themeIcon");

if(document.body.classList.contains('dark')){
icon.setAttribute("data-lucide","moon");
}else{
icon.setAttribute("data-lucide","sun");
}

lucide.createIcons();
}

/* LOAD */
window.onload=function(){
lucide.createIcons();
}

/* FADE */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

</script>

</body>
</html>
